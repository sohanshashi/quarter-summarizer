services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: quarter-summarizer-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: quarter-summarizer-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - NEST_APPLICATION_PORT=3001
      - NODE_ENV=production
    restart: unless-stopped
